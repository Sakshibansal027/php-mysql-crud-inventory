<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Inventory</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            border-color: #4a90e2;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #4a90e2;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Add New Product 🛒</h2>
    
    <form action="add_product.php" method="POST">
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="p_name" placeholder="e.g. iPhone 15" required>
        </div>
        
        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" step="0.01" name="p_price" placeholder="e.g. 79999" required>
        </div>
        
        <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" name="p_stock" placeholder="e.g. 15" required>
        </div>
        
        <button type="submit" name="add_product_btn">Add To Inventory</button>
    </form>
</div>

</body>
</html>
